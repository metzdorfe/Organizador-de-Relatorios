<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defina a sua Senha</title>
</head>
<body>
    <section class="boxForm">
        <div class="campoFormSenha">
            <label for="novaSenha">Senha</label>
            <input type="password" id="novaSenha" name="novaSenha" class="campoForm" minlength="6" required>
        </div>

        <div class="campoFormSenha">
            <label for="confirmar_senha">Confirmar Nova Senha</label>
            <input type="password" id="confirmarSenha" name="confirmarSenha" class="campoForm" minlength="6" required>
        </div>

        <button class="cadastrarSenha" type="submit">Redefinir Senha</button>
    </section>

    <script src="js/definirSenha.js"></script>
</body>
</html>
