<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso SGBR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <section class="painel-logo" aria-label="Identidade da empresa">
    <div class="logo-wrapper">
      <img
        src="assets/logo-sgbr.png"
        alt="Logo SGBR"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      >
      <div class="logo-placeholder" style="display:none;">SG</div>

      <div class="linha-decorativa"></div>

      <h1>Precisa de um <em>Relatório</em> personalizado?</h1>
      <p>Registre sua necessidade e acompanhe o desenvolvimento em tempo real.</p>
    </div>
  </section>

  <aside class="painel-login" aria-label="Formulário de login">
    <div class="card-login" role="main">
      <header>
        <p class="saudacao">Bem-vindo</p>
        <h2>Acesse sua conta</h2>
      </header>

      <form class="loginForm" id="loginForm" method="POST" action="http://localhost:3001/api/auth/" novalidate>
        <div class="campo">
          <label for="usuario">Nome de usuário</label>
          <input
            type="text"
            id="usuario"
            name="usuario"
            placeholder="seu.usuario"
            autocomplete="username"
            maxlength="100"
            required
          >
        </div>

        <div class="campo">
          <label for="senha">Senha</label>
          <div class="campo-senha">
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="••••••••"
              minlength="6"
              maxlength="128"
              autocomplete="current-password"
              required
            >
            <button type="button" class="toggle-senha" aria-label="Mostrar senha" id="toggleSenha">
              <svg id="iconeOlho" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-logar" id="btnLogar">Entrar</button>

        <div class="erro-msg" id="erroMsg" role="alert">
          Usuário ou senha incorretos. Tente novamente.
        </div>
      </form>

      <footer>
        <span>Precisa de acesso? Fale com o administrador.</span>
      </footer>
    </div>

    <p class="copyright">© 2026 Powered by Brendan Eich / Piccoli</p>
  </aside>

  <script src="js/login.js"></script>
  <div id="root" hidden></div>
</body>
</html>
